<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>실습 2-5</title>
</head>
<style> 
  table {
    border-collapse: collapse;
    width: 600px;
  }
  th, td {
    border: 1px solid darkgray;
    padding: 20px;
    text-align: center;
  }
   th {
    background-color: aqua;
  }
  .l {
    text-align: left;
  }
  #image {
    background-image: url('https://ak-d.tripcdn.com/images/1mj6z12000rv2lzm44C50_Z_640_10000_R5.jpg');
    background-size: cover;
    font-weight: bold;
  }
  caption {
    caption-side: bottom;
    font-weight: bold;
  }
</style>
<body>
  <table>
    <caption>2023 국민 독서실태</caption>
    <thead>
      <tr>
        <th class="l">구분</th>
        <th>성인</th>
        <th>독서자</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th class="l">종이책</th>
        <td>6.1권</td>
        <td id="image">11.8권</td>
      </tr>
      <tr>
        <th class="l">전자책</th>
        <td>1.2권</td>
        <td>7.1권</td>
      </tr>
      <tr>
        <th class="l">오디오북</th>
        <td>0.2권</td>
        <td>5.5권</td>
      </tr>      
    </tbody>
  </table>
</body>
</html>
