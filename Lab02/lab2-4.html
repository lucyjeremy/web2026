<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>실습 2-4</title>
    <style>
      .box{
        width:300px;
        height:70px;     
        margin:0 auto;
        text-shadow: 4px 3px 10px black;
      }
			#style1 {        
        background-color:#2121f4;          
        color:white;     
      }    
      #style2 {
        background-color:purple;  
        color: white;
        background: linear-gradient(to right, purple, indigo);
      }    
      #style3 {
        background-color: royalblue;  
        color: white;
        background: radial-gradient(ellipse at center, midnightblue,royalblue);     
      }    
      h1 {
        text-align: center;
        line-height: 70px;
      }
    </style>
  </head>
  <body>
    <div class="box" id="style1">
      <h1 id="basic">웹 개발 기초</h1>
    </div>
    <div class="box" id="style2">
      <h1>웹 개발 중급</h1>
    </div>
    <div class="box" id="style3">
      <h1>웹 개발 고급</h1>
    </div>
  </body>
</html>
