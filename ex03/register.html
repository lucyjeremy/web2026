<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김준영- 사용자 등록 페이지</title>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <section>
            <form>
                <fieldset>
                    <legend>기본 정보 (Essential)</legend>
                    <label for="ID">아이디:</label>
                    <input type="text" id="ID" name="ID"
                    placeholder="4~12자 영문/숫자"><br/>
                    <label for="pwd">비밀번호:</label>
                    <input type="password" id="pwd" name="pwd"><br/>
                    <label for="email">이메일:</label>
                    <input type="email" id="email" name="email"><br/>
                </fieldset>
                <fieldset>
                    <legend>부가 정보 (Optional)</legend>
                    <label for="phone">연락처:</label>
                    <input type="tel" id="phone" name="phone"
                    placeholder="'010-1234-5678"
                    pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}">
                    <label for="interest">관심 분야:</label>
                    <input type="checkbox" id="interest1" name="interest1" value="HTML5">
                    <label for="interest1">HTML5</label><br>
                    <input type="checkbox" id="interest2" name="interest2" value="CSS3">
                    <label for="interest2">CSS3</label><br>
                    <input type="checkbox" id="interest3" name="interest3" value="JavaScript">
                    <label for="interest3">JavaScript</label><br>
                    <label for="proficiency">숙련도:</label>
                    <input type="range" id="proficiency" name="proficiency">
                </fieldset>
                <input type="submit" value="가입 신청">
                <input type="reset" value="초기화">
            </form>
        </section>
     <footer>
        <a href="index.html">홈으로</a>
        <br/>
        &copy; 2026 Web Programming Course. All rights reserved.
    </footer>
</body>
</html>
