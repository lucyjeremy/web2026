<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김준영- 사용자 등록 페이지</title>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <br>
    <main>
        <section>
            <form>
                <fieldset>
                    <legend><strong>기본 정보 (Essential)</strong></legend><br>
                    <label for="ID">아이디:</label><br>
                    <input type="text" id="ID" name="ID" size="70" required autofocus
                    placeholder="4~12자 영문/숫자"><br><br>
                    <label for="pwd">비밀번호:</label><br>
                    <input type="password" id="pwd" name="pwd" size="70" required><br><br>
                    <label for="email">이메일:</label><br>
                    <input type="email" id="email" name="email" size="70" required><br><br>
                </fieldset>
                <br>
                <fieldset>
                    <legend><strong>부가 정보 (Optional)</strong></legend><br>
                    <label for="phone">연락처:</label><br>
                    <input type="tel" id="phone" name="phone" size="70"
                    placeholder="'010-1234-5678"
                    pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"><br><br>
                    <label for="interest">관심 분야:</label><br>
                    <input type="checkbox" id="interest1" name="interest1" value="HTML5">
                    <label for="interest1">HTML5</label>
                    <input type="checkbox" id="interest2" name="interest2" value="CSS3">
                    <label for="interest2">CSS3</label>
                    <input type="checkbox" id="interest3" name="interest3" value="JavaScript">
                    <label for="interest3">JavaScript</label><br><br>
                    <label for="proficiency">숙련도:</label><br>
                    <input type="range" id="proficiency" name="proficiency" min="0" max="100" step="10"><br><br>
                </fieldset>
                <br>
                <input type="submit" value="가입 신청">
                <input type="reset" value="초기화">
            </form>
        </section>
        <br><br>
    </main>
    <footer>
        <a href="index.html">홈으로</a>
        <br><br>
        © 2026 Web Programming Course. All rights reserved.
    </footer>
</body>
</html>
