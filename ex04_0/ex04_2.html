
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1,
        h2 {
            color: blue;
        }

        div h2 {
            background: yellow;
        }

        div>h2 {

        }

</head>

<body>

    <div>
        <h1>제목</h1>
    </div>
    <div>
        <p>문단</p>
    </div>
    <div>
        <h2>소제목</h2>
        <p>내용 </p>
        <span>
            <h2> 소제목 3</h2>
        </span>
        <h2>소제목 2</h2>
    </div>
</body>

</html>
